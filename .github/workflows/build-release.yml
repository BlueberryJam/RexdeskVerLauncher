name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
        working-directory: rexdesk-version-manager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller tkinterdnd2

      - name: Build standalone EXE
        run: |
          python -m PyInstaller --clean --noconfirm "Rexdesk Version Manager.spec"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist\Rexdesk Version Manager.exe" "release\Rexdesk Version Manager.exe" -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rexdesk-version-manager-windows
          path: |
            rexdesk-version-manager/release/Rexdesk Version Manager.exe
            rexdesk-version-manager/release/Rexdesk-Version-Manager-Setup.exe

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rexdesk-version-manager/release/Rexdesk Version Manager.exe
            rexdesk-version-manager/release/Rexdesk-Version-Manager-Setup.exe
